<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pdf-to-csv — VetCPA</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #d4212d;
      --accent-ink: #ffffff;
      --good: #047857;
      --bad: #b91c1c;
      --hover: #fef2f2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
    }
    .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }
    header h1 { margin: 0; font-size: 22px; }
    header p { color: var(--muted); margin: 4px 0 24px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    /* Drop zone */
    .drop {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 40px 16px;
      text-align: center;
      color: var(--muted);
      background: var(--card);
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .drop.dragover { background: var(--hover); border-color: var(--accent); color: var(--ink); }
    .drop strong { color: var(--ink); }
    .drop input[type="file"] { display: none; }

    /* Selected files list */
    .files { margin: 12px 0 0; padding: 0; list-style: none; }
    .files li {
      display: grid;
      grid-template-columns: minmax(160px, 1.4fr) 1fr minmax(150px, auto) auto auto;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-top: 6px;
      background: #fafafa;
    }
    .files .filename { font-weight: 500; overflow: hidden; text-overflow: ellipsis; }
    .files .size { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; }
    .files input[type="text"],
    .files select {
      padding: 5px 8px; border: 1px solid var(--border);
      border-radius: 4px; font-size: 13px; background: #fff;
      width: 100%;
    }
    .files input[type="text"]:focus,
    .files select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .files button.remove {
      border: none; background: transparent; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 0 4px;
    }
    .files button.remove:hover { color: var(--bad); }
    @media (max-width: 640px) {
      .files li { grid-template-columns: 1fr; }
    }

    /* Options */
    .options { display: flex; gap: 20px; flex-wrap: wrap; }
    .options label { display: flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer; }
    .options input { margin: 0; }

    /* Actions */
    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button.primary {
      background: var(--accent); color: var(--accent-ink);
      border: none; padding: 10px 18px; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: var(--card); color: var(--ink);
      border: 1px solid var(--border); padding: 10px 14px;
      border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    button.secondary:hover { background: #f3f4f6; }

    /* Status area */
    .status { margin-top: 8px; color: var(--muted); min-height: 20px; }
    .status.err { color: var(--bad); }

    /* Summary */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }
    .summary-grid .cell {
      background: #f9fafb; border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 12px;
    }
    .summary-grid .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .summary-grid .value { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Per-file table */
    table.perfile { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    table.perfile th, table.perfile td {
      border-bottom: 1px solid var(--border);
      padding: 6px 8px; text-align: left;
    }
    table.perfile th { color: var(--muted); font-weight: 600; }
    table.perfile .ok { color: var(--good); }
    table.perfile .err { color: var(--bad); }

    /* Results table */
    .rows-wrap { max-height: 480px; overflow: auto; border: 1px solid var(--border); border-radius: 6px; }
    table.rows { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.rows th, table.rows td {
      border-bottom: 1px solid var(--border);
      padding: 8px 10px; text-align: left; vertical-align: top;
      white-space: nowrap;
    }
    table.rows td.desc { white-space: normal; max-width: 380px; }
    table.rows td.amount { text-align: right; font-variant-numeric: tabular-nums; }
    table.rows td.amount.neg { color: var(--bad); }
    table.rows thead th { position: sticky; top: 0; background: #f9fafb; color: var(--muted); }

    .hidden { display: none !important; }
    .hint { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>pdf-to-csv</h1>
      <p>Drop bank/credit-card statement PDFs to extract transactions into a unified CSV.</p>
    </header>

    <div class="card">
      <label class="drop" id="drop">
        <input
          type="file"
          id="fileInput"
          multiple
          accept="application/pdf,.pdf,.jpg,.jpeg,image/jpeg,.png,image/png,.tif,.tiff,image/tiff,.bmp,image/bmp,.heic,.heif,image/heic,image/heif"
        />
        <div>
          <div><strong>Drop PDFs or photos here</strong> or click to browse</div>
          <div class="hint">Statements, receipts, phone photos, or scans. Accepted: PDF, JPG, PNG, TIFF, BMP, HEIC.</div>
        </div>
      </label>
      <ul class="files" id="fileList"></ul>
      <p class="hint" id="fileListHint" style="margin:10px 0 0;display:none;">
        Edit the title for each statement and pick an account type (leave as <em>Auto-detect</em> to let the app guess from the text).
      </p>
    </div>

    <div class="card">
      <div class="options">
        <label><input type="checkbox" id="optDedupe" checked /> Dedupe duplicate rows across files</label>
        <label><input type="checkbox" id="optIncludeSource" /> Include source columns (audit)</label>
        <label><input type="checkbox" id="optOcr" /> Enable OCR (for scanned PDFs)</label>
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="submitBtn" disabled>Extract transactions</button>
      <span class="status" id="status"></span>
    </div>

    <div class="card hidden" id="resultsCard">
      <h2 style="margin-top:0;font-size:16px;">Results</h2>
      <div class="summary-grid" id="summaryGrid"></div>
      <div id="byParser" class="hint" style="margin-bottom:12px;"></div>
      <table class="perfile" id="perFile"></table>

      <div class="actions" style="margin:16px 0 12px;">
        <button class="secondary" id="downloadCsvBtn">Download CSV</button>
        <button class="secondary" id="downloadExcelBtn">Download Excel</button>
      </div>

      <div class="rows-wrap">
        <table class="rows" id="rowsTable"></table>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    // Each entry: { file: File, title: string, accountType: string }
    // accountType "" means auto-detect (server will fill from doc text).
    const state = { entries: [] };

    const ACCOUNT_TYPES = [
      { value: "",           label: "Auto-detect" },
      { value: "visa",       label: "Visa" },
      { value: "mastercard", label: "Mastercard" },
      { value: "amex",       label: "American Express" },
      { value: "chequing",   label: "Chequing / Debit" },
      { value: "savings",    label: "Savings" },
      { value: "other",      label: "Other" },
    ];

    // Keep in sync with server-side ingest.SUPPORTED_INPUT_EXTS.
    const ACCEPTED_EXTS = new Set([
      ".pdf", ".jpg", ".jpeg", ".png", ".tif", ".tiff", ".bmp", ".heic", ".heif",
    ]);

    function extOf(name) {
      const i = name.lastIndexOf(".");
      return i >= 0 ? name.slice(i).toLowerCase() : "";
    }

    function defaultTitleFor(file) {
      // Strip the known extension; leave spaces/dashes alone for readability.
      const ext = extOf(file.name);
      return ext ? file.name.slice(0, -ext.length) : file.name;
    }

    const $ = (id) => document.getElementById(id);
    const drop = $("drop");
    const fileInput = $("fileInput");
    const fileList = $("fileList");
    const submitBtn = $("submitBtn");
    const statusEl = $("status");
    const resultsCard = $("resultsCard");

    // --- File selection + drag and drop -----------------------------------
    function addFiles(list) {
      const rejected = [];
      for (const f of list) {
        if (!ACCEPTED_EXTS.has(extOf(f.name))) { rejected.push(f.name); continue; }
        // Skip duplicates (by name + size).
        if (state.entries.some((e) => e.file.name === f.name && e.file.size === f.size)) continue;
        state.entries.push({
          file: f,
          title: defaultTitleFor(f),
          accountType: "", // auto-detect
        });
      }
      if (rejected.length) {
        setStatus(
          `Skipped ${rejected.length} file(s) — only PDF / JPG / PNG / TIFF / BMP / HEIC are accepted.`,
          true,
        );
      }
      renderFiles();
    }
    function removeAt(idx) { state.entries.splice(idx, 1); renderFiles(); }

    function renderFiles() {
      fileList.innerHTML = "";
      for (let i = 0; i < state.entries.length; i++) {
        const e = state.entries[i];
        const li = document.createElement("li");

        const fname = document.createElement("span");
        fname.className = "filename";
        fname.title = e.file.name;
        fname.textContent = e.file.name;

        const size = document.createElement("span");
        size.className = "size";
        size.textContent = formatSize(e.file.size);

        const titleInput = document.createElement("input");
        titleInput.type = "text";
        titleInput.value = e.title;
        titleInput.placeholder = "Statement title";
        titleInput.setAttribute("aria-label", `Title for ${e.file.name}`);
        titleInput.addEventListener("input", (ev) => { state.entries[i].title = ev.target.value; });

        const typeSelect = document.createElement("select");
        typeSelect.setAttribute("aria-label", `Account type for ${e.file.name}`);
        for (const opt of ACCOUNT_TYPES) {
          const o = document.createElement("option");
          o.value = opt.value; o.textContent = opt.label;
          if (opt.value === e.accountType) o.selected = true;
          typeSelect.appendChild(o);
        }
        typeSelect.addEventListener("change", (ev) => { state.entries[i].accountType = ev.target.value; });

        const remove = document.createElement("button");
        remove.className = "remove";
        remove.setAttribute("aria-label", "Remove");
        remove.title = "Remove";
        remove.textContent = "✕";
        remove.addEventListener("click", (ev) => {
          ev.preventDefault(); ev.stopPropagation(); removeAt(i);
        });

        li.appendChild(fname);
        li.appendChild(titleInput);
        li.appendChild(typeSelect);
        li.appendChild(size);
        li.appendChild(remove);
        fileList.appendChild(li);
      }
      submitBtn.disabled = state.entries.length === 0;
      document.getElementById("fileListHint").style.display =
        state.entries.length > 0 ? "block" : "none";
    }

    fileInput.addEventListener("change", (e) => addFiles(e.target.files));

    ["dragenter", "dragover"].forEach((ev) =>
      drop.addEventListener(ev, (e) => {
        e.preventDefault(); e.stopPropagation();
        drop.classList.add("dragover");
      })
    );
    ["dragleave", "drop"].forEach((ev) =>
      drop.addEventListener(ev, (e) => {
        e.preventDefault(); e.stopPropagation();
        drop.classList.remove("dragover");
      })
    );
    drop.addEventListener("drop", (e) => {
      if (e.dataTransfer && e.dataTransfer.files) addFiles(e.dataTransfer.files);
    });

    // --- Submit -----------------------------------------------------------
    submitBtn.addEventListener("click", async () => {
      if (state.entries.length === 0) return;
      setStatus(`Uploading and extracting ${state.entries.length} PDF(s)...`);
      submitBtn.disabled = true;

      try {
        const t0 = performance.now();
        const res = await fetch(buildUrl("json"), { method: "POST", body: buildFormData() });
        if (!res.ok) {
          const detail = await readError(res);
          throw new Error(`HTTP ${res.status}: ${detail}`);
        }
        const data = await res.json();
        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
        renderResults(data);
        setStatus(`Done in ${elapsed}s.`);
      } catch (e) {
        setStatus(`Error: ${e.message || e}`, true);
      } finally {
        submitBtn.disabled = state.entries.length === 0;
      }
    });

    // --- Downloads --------------------------------------------------------
    $("downloadCsvBtn").addEventListener("click", () => downloadAs("csv"));
    $("downloadExcelBtn").addEventListener("click", () => downloadAs("excel"));

    async function downloadAs(format) {
      if (state.entries.length === 0) return;
      setStatus(`Building ${format.toUpperCase()}...`);
      try {
        const res = await fetch(buildUrl(format), { method: "POST", body: buildFormData() });
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${await readError(res)}`);
        const blob = await res.blob();
        const filename = format === "excel" ? "transactions.xlsx" : "transactions.csv";
        triggerDownload(blob, filename);
        setStatus(`Downloaded ${filename}.`);
      } catch (e) {
        setStatus(`Error: ${e.message || e}`, true);
      }
    }

    function buildFormData() {
      const form = new FormData();
      for (const e of state.entries) {
        form.append("files", e.file, e.file.name);
        form.append("titles", e.title || "");
        form.append("account_types", e.accountType || "");
      }
      return form;
    }

    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
    }

    // --- Rendering --------------------------------------------------------
    function renderResults(data) {
      resultsCard.classList.remove("hidden");

      const s = data.summary || {};
      $("summaryGrid").innerHTML = `
        ${cell("PDFs processed", s.files_processed)}
        ${cell("PDFs failed", s.files_failed, s.files_failed > 0 ? "err" : "")}
        ${cell("Rows extracted", s.rows_extracted)}
        ${cell("After dedup", s.rows_after_dedup)}
      `;

      const byParserStr = Object.entries(s.by_parser || {})
        .map(([k, v]) => `${k}: ${v}`).join(" · ");
      const byTypeStr = Object.entries(s.by_account_type || {})
        .map(([k, v]) => `${k}: ${v}`).join(" · ");
      $("byParser").innerHTML =
        (byTypeStr ? `By account type: ${escapeHtml(byTypeStr)}<br>` : "") +
        (byParserStr ? `By parser: ${escapeHtml(byParserStr)}` : "");

      const pf = $("perFile");
      pf.innerHTML = `
        <thead><tr>
          <th>File</th><th>Title</th><th>Account</th><th>Parser</th><th>Rows</th><th>Status</th>
        </tr></thead>
        <tbody>${(data.files || []).map(f => `
          <tr>
            <td>${escapeHtml(f.filename || "")}</td>
            <td>${escapeHtml(f.title || "—")}</td>
            <td>${escapeHtml(f.account_type || "—")}</td>
            <td>${escapeHtml(f.parser || "—")}</td>
            <td>${f.rows ?? 0}</td>
            <td class="${f.error ? "err" : "ok"}">${f.error ? escapeHtml(f.error) : "ok"}</td>
          </tr>`).join("")}</tbody>
      `;

      const rows = data.rows || [];
      const cols = rows.length ? Object.keys(rows[0]) : [
        "StatementTitle","AccountType","Date","Amount","Payee","Description","Reference","CheckNumber",
      ];
      const head = `<thead><tr>${cols.map(c => `<th>${escapeHtml(c)}</th>`).join("")}</tr></thead>`;
      const body = rows.map(r => `<tr>${cols.map(c => {
        const v = r[c] == null ? "" : String(r[c]);
        const cls = c === "Amount"
          ? `amount${v.startsWith("-") ? " neg" : ""}`
          : c === "Description"
            ? "desc"
            : "";
        return `<td class="${cls}">${escapeHtml(v)}</td>`;
      }).join("")}</tr>`).join("");
      $("rowsTable").innerHTML = head + `<tbody>${body}</tbody>`;
    }

    function cell(label, value, cls) {
      return `<div class="cell">
        <div class="label">${escapeHtml(label)}</div>
        <div class="value ${cls || ""}">${value ?? "—"}</div>
      </div>`;
    }

    // --- Helpers ----------------------------------------------------------
    function buildUrl(format) {
      const params = new URLSearchParams();
      params.set("format", format);
      if ($("optIncludeSource").checked) params.set("include_source", "true");
      if (!$("optDedupe").checked) params.set("dedupe", "false");
      if ($("optOcr").checked) params.set("ocr", "true");
      return `/extract?${params.toString()}`;
    }

    async function readError(res) {
      try {
        const j = await res.json();
        return j.detail || JSON.stringify(j);
      } catch { return res.statusText; }
    }

    function setStatus(msg, isError) {
      statusEl.textContent = msg;
      statusEl.classList.toggle("err", !!isError);
    }

    function formatSize(n) {
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / (1024 * 1024)).toFixed(1)} MB`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => (
        { "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[c]
      ));
    }
  </script>
</body>
</html>
